<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ご予約・お問い合わせ</title>
    <style>
        /* 自由に変更できるCSS */
        .form-container { max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-family: sans-serif; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #success-message { display: none; color: #28a745; font-weight: bold; text-align: center; margin-top: 20px; padding: 10px; background-color: #e8f5e9; border-radius: 4px; }
    </style>
</head>
<body>

<div class="form-container">
    <form id="custom-form">
        <!-- 1. お名前 -->
        <div class="input-group">
            <label for="name">お名前</label>
            <input type="text" id="name" name="entry.111111111" placeholder="山田 太郎" required>
        </div>

        <!-- 2. 何名様か（数値のみ入力可能） -->
        <div class="input-group">
            <label for="guests">何名様か</label>
            <input type="number" id="guests" name="entry.222222222" min="1" placeholder="2" required>
        </div>

        <!-- 3. 送信時間（画面には表示しない隠しフィールド） -->
        <input type="hidden" id="submit-time" name="entry.333333333">

        <button type="submit">送信する</button>
    </form>

    <div id="success-message">送信が完了しました。ありがとうございます！</div>
</div>

<script>
document.getElementById('custom-form').addEventListener('submit', function(e) {
    e.preventDefault();

    // 変更点：現在時刻を「2026/06/25 14:09:00」の形式で自動生成して隠しフィールドにセット
    const now = new Date();
    const formattedTime = now.getFullYear() + '/' +
        ('0' + (now.getMonth() + 1)).slice(-2) + '/' +
        ('0' + now.getDate()).slice(-2) + ' ' +
        ('0' + now.getHours()).slice(-2) + ':' +
        ('0' + now.getMinutes()).slice(-2) + ':' +
        ('0' + now.getSeconds()).slice(-2);
    
    document.getElementById('submit-time').value = formattedTime;

    // Googleフォームのaction URL（ご自身のURLに書き換えてください）
    const googleFormUrl = 'https://google.com';
    
    const formData = new FormData(this);

    fetch(googleFormUrl, {
        method: 'POST',
        body: formData,
        mode: 'no-cors' 
    })
    .then(() => {
        document.getElementById('custom-form').reset();
        document.getElementById('success-message').style.display = 'block';
    })
    .catch((error) => {
        alert('送信に失敗しました。再度お試しください。');
        console.error('Error:', error);
    });
});
</script>

</body>
</html>
